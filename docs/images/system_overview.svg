<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="'Cascadia Code', 'JetBrains Mono', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1e293b"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#b91c1c"/>
    </marker>
    <filter id="sketch" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence baseFrequency="0.02" numOctaves="2" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>

  <rect width="1000" height="480" fill="#fffef9"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Manual Graph-RAG — System Overview</text>

  <!-- User query -->
  <g>
    <rect x="40" y="200" width="140" height="80" rx="12" ry="12" fill="#fef3c7" stroke="#92400e" stroke-width="2.5"/>
    <text x="110" y="232" text-anchor="middle" font-size="14" fill="#1e293b">User</text>
    <text x="110" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Query</text>
  </g>

  <!-- Safety Gate -->
  <g>
    <rect x="240" y="180" width="160" height="120" rx="12" ry="12" fill="#fecaca" stroke="#b91c1c" stroke-width="2.5"/>
    <text x="320" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Safety Gate</text>
    <text x="320" y="244" text-anchor="middle" font-size="11" fill="#64748b">pattern check</text>
    <text x="320" y="262" text-anchor="middle" font-size="11" fill="#64748b">veto models</text>
    <text x="320" y="280" text-anchor="middle" font-size="11" fill="#64748b">SHA-pinned</text>
  </g>

  <!-- Retrieval -->
  <g>
    <rect x="460" y="180" width="160" height="120" rx="12" ry="12" fill="#dcfce7" stroke="#15803d" stroke-width="2.5"/>
    <text x="540" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Hybrid Retrieval</text>
    <text x="540" y="244" text-anchor="middle" font-size="11" fill="#64748b">lexical + semantic</text>
    <text x="540" y="262" text-anchor="middle" font-size="11" fill="#64748b">Reciprocal Rank</text>
    <text x="540" y="280" text-anchor="middle" font-size="11" fill="#64748b">Fusion</text>
  </g>

  <!-- Enrichment -->
  <g>
    <rect x="680" y="180" width="160" height="120" rx="12" ry="12" fill="#dbeafe" stroke="#1e40af" stroke-width="2.5"/>
    <text x="760" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Packet Enricher</text>
    <text x="760" y="244" text-anchor="middle" font-size="11" fill="#64748b">graph walk</text>
    <text x="760" y="262" text-anchor="middle" font-size="11" fill="#64748b">semantic backfill</text>
    <text x="760" y="280" text-anchor="middle" font-size="11" fill="#64748b">cap 5 nodes</text>
  </g>

  <!-- Verbalizer + answer -->
  <g>
    <rect x="880" y="200" width="100" height="80" rx="12" ry="12" fill="#ede9fe" stroke="#5b21b6" stroke-width="2.5"/>
    <text x="930" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Verbalizer</text>
    <text x="930" y="252" text-anchor="middle" font-size="11" fill="#64748b">+ Validator</text>
  </g>

  <!-- Cited answer -->
  <g>
    <rect x="800" y="350" width="180" height="80" rx="12" ry="12" fill="#fffbeb" stroke="#92400e" stroke-width="2.5"/>
    <text x="890" y="382" text-anchor="middle" font-size="14" fill="#1e293b">Cited Answer</text>
    <text x="890" y="402" text-anchor="middle" font-size="11" fill="#64748b">every word cited</text>
    <text x="890" y="418" text-anchor="middle" font-size="11" fill="#64748b">+ trace</text>
  </g>

  <!-- Refusal -->
  <g>
    <rect x="240" y="350" width="160" height="80" rx="12" ry="12" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5"/>
    <text x="320" y="382" text-anchor="middle" font-size="14" fill="#1e293b">Typed Refusal</text>
    <text x="320" y="402" text-anchor="middle" font-size="11" fill="#64748b">decoder NEVER</text>
    <text x="320" y="418" text-anchor="middle" font-size="11" fill="#64748b">invoked</text>
  </g>

  <!-- Arrows -->
  <path d="M 180 240 Q 215 240 240 240" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 400 240 Q 435 240 460 240" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="430" y="230" text-anchor="middle" font-size="10" fill="#15803d" font-weight="bold">ALLOW</text>
  <path d="M 620 240 Q 655 240 680 240" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 840 240 Q 865 240 880 240" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 930 280 Q 930 320 890 350" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- BLOCK arrow from gate to refusal -->
  <path d="M 320 300 Q 320 325 320 350" fill="none" stroke="#b91c1c" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrRed)"/>
  <text x="340" y="332" font-size="10" fill="#b91c1c" font-weight="bold">BLOCK</text>

  <!-- Bottom callouts -->
  <g>
    <text x="500" y="100" text-anchor="middle" font-size="13" fill="#64748b" font-style="italic">Every component is local. Every output is cited. Every refusal is sub-millisecond.</text>
  </g>

  <!-- Legend dots -->
  <g transform="translate(40, 440)">
    <circle cx="0" cy="0" r="6" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
    <text x="14" y="4" font-size="11" fill="#64748b">safety boundary</text>
    <circle cx="160" cy="0" r="6" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="174" y="4" font-size="11" fill="#64748b">retrieval</text>
    <circle cx="280" cy="0" r="6" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="294" y="4" font-size="11" fill="#64748b">graph walk</text>
    <circle cx="410" cy="0" r="6" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
    <text x="424" y="4" font-size="11" fill="#64748b">verbalization</text>
  </g>
</svg>
