<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Cascadia Code', 'JetBrains Mono', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1e293b"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#b91c1c"/>
    </marker>
  </defs>
  <rect width="1100" height="720" fill="#fffef9"/>

  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Inference Pipeline — End to End</text>
  <text x="550" y="60" text-anchor="middle" font-size="13" fill="#64748b" font-style="italic">all components run locally; the decoder is invoked only after the gate has approved an evidence packet</text>

  <!-- Stage 1: Intent + gate -->
  <rect x="40" y="100" width="240" height="140" rx="12" fill="#fef3c7" stroke="#92400e" stroke-width="2.5"/>
  <text x="160" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">STAGE 1</text>
  <text x="160" y="154" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Classify + Gate</text>
  <text x="160" y="180" text-anchor="middle" font-size="11" fill="#1e293b">intent classifier (regex)</text>
  <text x="160" y="198" text-anchor="middle" font-size="11" fill="#1e293b">prompt-injection patterns</text>
  <text x="160" y="216" text-anchor="middle" font-size="11" fill="#1e293b">unsupported-repair patterns</text>
  <text x="160" y="232" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="bold">&lt; 1 ms</text>

  <!-- Stage 2: Retrieval -->
  <rect x="320" y="100" width="240" height="140" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="2.5"/>
  <text x="440" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">STAGE 2</text>
  <text x="440" y="154" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Hybrid Retrieval</text>
  <text x="440" y="180" text-anchor="middle" font-size="11" fill="#1e293b">top-K lexical (token overlap)</text>
  <text x="440" y="198" text-anchor="middle" font-size="11" fill="#1e293b">top-K semantic (cosine)</text>
  <text x="440" y="216" text-anchor="middle" font-size="11" fill="#1e293b">weighted RRF fusion</text>
  <text x="440" y="232" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="bold">&lt; 2 ms</text>

  <!-- Stage 3: Veto -->
  <rect x="600" y="100" width="240" height="140" rx="12" fill="#fecaca" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="720" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">STAGE 3</text>
  <text x="720" y="154" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Veto Models</text>
  <text x="720" y="180" text-anchor="middle" font-size="11" fill="#1e293b">safety-veto (logreg)</text>
  <text x="720" y="198" text-anchor="middle" font-size="11" fill="#1e293b">wrong-entity veto (logreg)</text>
  <text x="720" y="216" text-anchor="middle" font-size="11" fill="#1e293b">decision: ALLOW / BLOCK</text>
  <text x="720" y="232" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="bold">&lt; 1 ms</text>

  <!-- Decision diamond -->
  <g>
    <polygon points="940,170 1010,140 1080,170 1010,200" fill="#fef3c7" stroke="#92400e" stroke-width="2.5"/>
    <text x="1010" y="174" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">ALLOW?</text>
  </g>

  <!-- BLOCK path -->
  <rect x="940" y="280" width="140" height="80" rx="12" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="1010" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">REFUSAL</text>
  <text x="1010" y="330" text-anchor="middle" font-size="10" fill="#64748b">typed reason</text>
  <text x="1010" y="346" text-anchor="middle" font-size="10" fill="#64748b">decoder NEVER called</text>

  <!-- Stage 4: Enrichment -->
  <rect x="40" y="320" width="240" height="140" rx="12" fill="#dbeafe" stroke="#1e40af" stroke-width="2.5"/>
  <text x="160" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">STAGE 4</text>
  <text x="160" y="374" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Packet Enrichment</text>
  <text x="160" y="400" text-anchor="middle" font-size="11" fill="#1e293b">parent procedure</text>
  <text x="160" y="418" text-anchor="middle" font-size="11" fill="#1e293b">sibling + next steps</text>
  <text x="160" y="436" text-anchor="middle" font-size="11" fill="#1e293b">semantic backfill</text>
  <text x="160" y="452" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="bold">&lt; 2 ms</text>

  <!-- Stage 5: Verbalizer -->
  <rect x="320" y="320" width="240" height="140" rx="12" fill="#ede9fe" stroke="#5b21b6" stroke-width="2.5"/>
  <text x="440" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">STAGE 5</text>
  <text x="440" y="374" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Local Decoder</text>
  <text x="440" y="400" text-anchor="middle" font-size="11" fill="#1e293b">greedy decoding</text>
  <text x="440" y="418" text-anchor="middle" font-size="11" fill="#1e293b">conversational tone</text>
  <text x="440" y="436" text-anchor="middle" font-size="11" fill="#1e293b">numbered list rendering</text>
  <text x="440" y="452" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="bold">~ 3-4 seconds</text>

  <!-- Stage 6: Validator -->
  <rect x="600" y="320" width="240" height="140" rx="12" fill="#fecaca" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="720" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">STAGE 6</text>
  <text x="720" y="374" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Citation Validator</text>
  <text x="720" y="400" text-anchor="middle" font-size="11" fill="#1e293b">every cite ⊆ packet</text>
  <text x="720" y="418" text-anchor="middle" font-size="11" fill="#1e293b">no uncited sentence</text>
  <text x="720" y="436" text-anchor="middle" font-size="11" fill="#1e293b">no wrong-product term</text>
  <text x="720" y="452" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="bold">&lt; 1 ms</text>

  <!-- Final answer -->
  <rect x="880" y="430" width="180" height="80" rx="12" fill="#fffbeb" stroke="#92400e" stroke-width="2.5"/>
  <text x="970" y="462" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Cited Answer</text>
  <text x="970" y="484" text-anchor="middle" font-size="10" fill="#64748b">+ full audit trace</text>
  <text x="970" y="500" text-anchor="middle" font-size="10" fill="#64748b">+ packet hash</text>

  <!-- Arrows -->
  <path d="M 280 170 L 320 170" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 560 170 L 600 170" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 840 170 L 940 170" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ALLOW path: down to enrichment -->
  <path d="M 1010 200 L 1010 250 L 160 250 L 160 320" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="600" y="240" font-size="10" fill="#15803d" font-weight="bold">ALLOW</text>

  <!-- BLOCK path -->
  <path d="M 1010 200 L 1010 280" fill="none" stroke="#b91c1c" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrRed)"/>
  <text x="1025" y="245" font-size="10" fill="#b91c1c" font-weight="bold">BLOCK</text>

  <!-- Enrichment -> verbalizer -> validator -> answer -->
  <path d="M 280 390 L 320 390" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 560 390 L 600 390" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 840 410 L 880 460" fill="none" stroke="#1e293b" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Validator fallback -->
  <path d="M 720 460 Q 720 520 600 520 Q 480 520 440 460" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="580" y="540" font-size="10" fill="#64748b" font-style="italic">if validation fails → deterministic fallback renderer</text>

  <!-- Bottom: artifacts feeding stages -->
  <g transform="translate(0, 590)">
    <text x="160" y="0" text-anchor="middle" font-size="11" fill="#64748b" font-weight="bold">artifacts</text>
    <rect x="40" y="10" width="240" height="100" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="160" y="35" text-anchor="middle" font-size="11" fill="#1e293b">configs/safety_gate.yaml</text>
    <text x="160" y="55" text-anchor="middle" font-size="11" fill="#1e293b">artifacts/safety/*.json</text>
    <text x="160" y="75" text-anchor="middle" font-size="11" fill="#1e293b">artifacts/products/*/graph/*.jsonl</text>
    <text x="160" y="95" text-anchor="middle" font-size="11" fill="#1e293b">artifacts/products/*/graph/semantic_index.npz</text>
  </g>
  <g transform="translate(440, 590)">
    <text x="160" y="0" text-anchor="middle" font-size="11" fill="#64748b" font-weight="bold">models</text>
    <rect x="40" y="10" width="240" height="100" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="160" y="35" text-anchor="middle" font-size="11" fill="#1e293b">models/local_decoder.pt</text>
    <text x="160" y="55" text-anchor="middle" font-size="11" fill="#1e293b">models/tokenizer/</text>
    <text x="160" y="75" text-anchor="middle" font-size="11" fill="#1e293b">models/encoder/</text>
    <text x="160" y="95" text-anchor="middle" font-size="11" fill="#1e293b" font-style="italic">all bundled in the release</text>
  </g>
</svg>
